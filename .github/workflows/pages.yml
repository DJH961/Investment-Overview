name: Deploy Pages

# Builds and publishes the static web companion (docs/v3.0 proposal §4) to
# GitHub Pages. It compiles the Vite/TypeScript front-end in `web/` and uploads
# the `web/dist` build output.
#
# NOTE: nothing is served until Pages is enabled in repo Settings → Pages
# (Source: "GitHub Actions"). Keep that disabled while the repo is private and
# the encrypted ledger frontend is not yet ready.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow only one concurrent deployment; never cancel an in-progress one so a
# half-published site is impossible.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
