name: Deploy Pages

# Builds and publishes the static web companion (docs/v3.0 proposal §4) to
# GitHub Pages. This workflow is scaffolded ahead of the Phase 3 front-end:
# today it publishes the placeholder shell in `web/`. When the Vite/TypeScript
# build lands, replace the "Build site" step with the real `npm ci && npm run
# build` and point the upload at the build output directory.
#
# NOTE: nothing is served until Pages is enabled in repo Settings → Pages
# (Source: "GitHub Actions"). Keep that disabled while the repo is private and
# the encrypted ledger frontend is not yet ready.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow only one concurrent deployment; never cancel an in-progress one so a
# half-published site is impossible.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Placeholder: publishes the static shell as-is. Swap for the Vite build
      # (npm ci && npm run build, upload ./web/dist) when the frontend exists.
      - name: Build site
        run: |
          echo "Publishing static web/ shell (placeholder until Phase 3)."
          test -f web/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
