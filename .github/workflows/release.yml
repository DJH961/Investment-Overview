name: Release

# Build a wheel + sdist + Windows one-file installer and publish them as a
# GitHub Release. Triggers on any ``v*`` tag push (e.g. ``v2.1.0``) and is
# also available as a manual ``workflow_dispatch`` so a release can be cut
# without having to push a tag from a local clone.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.1.0). Must already exist on the repo."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-distributions:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  build-windows-installer:
    name: Build InvestmentDashboard-Setup.exe
    # Pinned to ``windows-2022`` on purpose. ``windows-latest`` now resolves
    # to Windows Server 2025, whose Universal C Runtime (UCRT) and api-set
    # forwarder DLLs are newer than those shipped on Windows 10 / 11 client
    # SKUs. PyInstaller bundles those DLLs from the build machine into the
    # one-file installer, and when the bootloader extracts them on an
    # end-user box the loader rejects the mismatched ``ucrtbase.dll`` with
    # ``Bad Image`` / ``Error status 0xc0e90002``. Building on
    # ``windows-2022`` produces a UCRT payload that is compatible with all
    # currently supported client Windows versions.
    runs-on: windows-2022
    needs: build-distributions
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-distributions.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Download distribution artifacts
        # The PyInstaller spec embeds any ``investment_dashboard-*.whl``
        # found in ``dist/`` into the installer .exe under a
        # ``bundled_wheels/`` directory. The bootstrapper pip-installs
        # that wheel directly at install time, which is the only way
        # ``InvestmentDashboard-Setup.exe`` can work for end-users:
        # this repository is private, so anonymous GitHub requests for
        # release metadata / assets from the user's machine return HTTP
        # 404.
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build one-file installer
        run: pyinstaller --clean --noconfirm installer/installer.spec

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/InvestmentDashboard-Setup.exe

  build-windows-portable:
    name: Build InvestmentDashboard-Portable.zip
    # The portable bundle is just an unpacked embeddable Python plus the
    # dashboard wheel. Building it on Windows lets us shell out to the
    # same PowerShell primitives an end-user would have, but the bundle
    # itself is platform-agnostic (the embeddable Python is the
    # Windows-AMD64 build, so the resulting ZIP only runs on Windows).
    # Pinned to ``windows-2022`` for the same UCRT reason as the
    # one-file installer above.
    runs-on: windows-2022
    needs: build-distributions
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-distributions.outputs.tag }}

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Assemble portable bundle
        shell: pwsh
        env:
          EMBED_PYTHON_VERSION: 3.12.7
        run: |
          $ErrorActionPreference = 'Stop'
          $bundleRoot = 'portable/InvestmentDashboard-Portable'
          New-Item -ItemType Directory -Force -Path $bundleRoot | Out-Null

          # 1. Drop the embeddable Python next to the launcher.
          $embedUrl = "https://www.python.org/ftp/python/$env:EMBED_PYTHON_VERSION/python-$env:EMBED_PYTHON_VERSION-embed-amd64.zip"
          Invoke-WebRequest -Uri $embedUrl -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath "$bundleRoot/python" -Force

          # 2. Enable `import site` so pip-installed packages are found.
          Get-ChildItem "$bundleRoot/python" -Filter 'python*._pth' | ForEach-Object {
            (Get-Content $_.FullName) `
              -replace '#import site','import site' |
              Set-Content $_.FullName
          }

          # 3. Bootstrap pip into the bundled interpreter.
          Invoke-WebRequest -Uri 'https://bootstrap.pypa.io/get-pip.py' -OutFile get-pip.py
          & "$bundleRoot/python/python.exe" get-pip.py
          Remove-Item get-pip.py

          # 4. Install the freshly built wheel + its runtime dependencies
          #    into the bundled site-packages so the ZIP is fully offline.
          $wheel = Get-ChildItem dist -Filter 'investment_dashboard-*.whl' | Select-Object -First 1
          if (-not $wheel) { throw 'No wheel found in dist/' }
          & "$bundleRoot/python/python.exe" -m pip install --no-warn-script-location $wheel.FullName

          # 5. Ship the portable launcher + the double-clickable .cmd
          #    alongside a tiny README so users know what to do.
          Copy-Item installer/portable_launcher.py $bundleRoot/portable_launcher.py
          Copy-Item installer/Run-InvestmentDashboard.cmd $bundleRoot/Run-InvestmentDashboard.cmd
          Copy-Item installer/PORTABLE_README.txt $bundleRoot/README.txt

          # 6. Zip it up.
          $zip = "InvestmentDashboard-Portable.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "$bundleRoot/*" -DestinationPath $zip
          Write-Host "Bundle assembled: $zip"

      - name: Upload portable bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: InvestmentDashboard-Portable.zip

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-distributions, build-windows-installer, build-windows-portable]
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts/dist

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows-installer

      - name: Download Windows portable bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: artifacts/windows-portable

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-distributions.outputs.tag }}
          name: ${{ needs.build-distributions.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/dist/*
            artifacts/windows-installer/InvestmentDashboard-Setup.exe
            artifacts/windows-portable/InvestmentDashboard-Portable.zip
