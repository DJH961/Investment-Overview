# wrangler.toml — deploy config for the live-web blob CORS proxy.
#
# This Worker fetches the encrypted `portfolio.enc` GitHub release asset
# server-side and re-serves it with permissive CORS headers, so the GitHub
# Pages companion can download it from the browser. See README.md to deploy.

name = "investment-overview-blob-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# The single upstream this proxy is allowed to fetch. Change the owner/repo or
# release tag here if you ever rename them. Keeping it pinned makes this a
# closed (non-SSRF) proxy: it can only ever return *your* encrypted blob.
#
# META_URL is the tiny version sidecar (portfolio.meta.json) served when the
# companion requests `?meta`. Leave it unset to derive it from RELEASE_URL by
# swapping the filename — only set it if the sidecar lives somewhere else.
[vars]
RELEASE_URL = "https://github.com/DJH961/Investment-Overview/releases/download/live-data/portfolio.enc"
# META_URL = "https://github.com/DJH961/Investment-Overview/releases/download/live-data/portfolio.meta.json"

# Tiingo price-fallback secret (used only by the `…/price` and `…/iex-intraday`
# routes). It is a *secret*, NOT a [vars] entry, so it is never committed: set it
# once with
#   wrangler secret put TIINGO_TOKEN
# The browser companion stays Tiingo-keyless — the token lives only here.
#
# TIINGO_HOURLY_RESERVE bounds how many Tiingo upstream requests the Worker will
# make per rolling hour (per isolate) before answering 429 + Retry-After. Leave
# unset to use the built-in default of 40/hr; to override, add it under the
# existing [vars] table above, e.g.  TIINGO_HOURLY_RESERVE = "40"
