<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Investment Overview">
  <!--
    Maskable + any-purpose app icon. The gradient fills the whole canvas
    (full bleed) so platform masks (circle, squircle, rounded square) never clip
    a transparent corner; the chart glyph sits well inside the central 80% safe
    zone. Brand gradient mirrors the web app accent (indigo -> cyan).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- rising area + line, centered in the safe zone -->
  <path d="M136 332 L216 268 L288 304 L376 184 L376 360 L136 360 Z"
        fill="#ffffff" fill-opacity="0.18"/>
  <polyline points="136,332 216,268 288,304 376,184"
            fill="none" stroke="#ffffff" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="376" cy="184" r="20" fill="#ffffff"/>
</svg>
